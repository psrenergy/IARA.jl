name: Publish
on:
  workflow_dispatch:
    inputs:
      windows:
        description: "Build windows"
        required: true
        type: boolean
        default: true
      linux:
        description: "Build linux"
        required: true
        type: boolean
        default: true
      development_stage:
        type: choice
        description: "Development stage"
        required: true
        options:
          - Alpha
          - Beta
          - RC
          - Stable
      version_suffix:
        description: "Version suffix (ignored if stable)"
        type: string
        required: false
      overwrite:
        description: "Overwrite"
        required: true
        type: boolean
        default: false
      docker_only:
        description: "Skip builds and only publish Docker image"
        required: true
        type: boolean
        default: false

env:
  SLACK_BOT_USER_OAUTH_ACCESS_TOKEN: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}

jobs:
  pre-publish:
    name: Tag check
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: psrenergy/assert-tag@v1

  build-publish-hub:
    name: Build and publish Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'psrenergy',
              repo: 'hub',
              workflow_id: 'Publish-Model.yml',
              ref: 'master',
              inputs: { model: context.repo.repo, model_sha: context.sha },
            })

  build-publish-os:
    strategy:
      fail-fast: true
      matrix:
        os: [windows, linux]
    name: Build and publish ${{ matrix.os }}
    needs: [pre-publish]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6
        if: inputs[matrix.os] == true
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - uses: psrenergy/setup-git-token@v1
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Start AWS ECS instance
        if: inputs[matrix.os] == true
        run: julia +1.11.2 --project=./compile ./compile/ecs.jl --development_stage "${{ inputs.development_stage }}" --version_suffix "${{ inputs.version_suffix }}" --overwrite "${{ inputs.overwrite }}" --os ${{ matrix.os }}

      - name: Publish PSRCloud
        if: matrix.os == 'linux' && inputs.psrcloud == true
        run: julia +1.11.2 --project=./compile ./compile/psrcloud.jl --development_stage "${{ inputs.development_stage }}" --version_suffix "${{ inputs.version_suffix }}"

  post-publish:
    if: inputs.development_stage == 'Stable'
    name: Create release
    runs-on: self-hosted
    needs:
      - build-publish-hub
      - build-publish-os
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: psrenergy/create-tag-and-release@v1

  notify-failure:
    name: Notify Slack on failure
    if: failure()
    needs:
      - pre-publish
      - build-publish-hub
      - build-publish-os
      - post-publish
    runs-on: [self-hosted, linux]
    steps:
      - uses: psrenergy/notify-on-failure@v1
        with:
          token: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
          channel: C05FS4ZJYLU
