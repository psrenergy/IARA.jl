name: publish
on:
  workflow_dispatch:
    inputs:
      windows:
        description: 'Build windows'
        required: true
        type: boolean
        default: true
      linux:
        description: 'Build linux'
        required: true
        type: boolean
        default: true
      development_stage:
          type: choice
          description: 'Development stage'
          required: true
          options:
          - Pre alpha
          - Alpha
          - Beta
          - Release candidate
          - Stable release
      version_suffix:
        description: 'Version suffix (ignored if stable release)'
        default: ''
        type: string
        required: false
      overwrite:
        description: 'Overwrite'
        required: true
        type: boolean
        default: false
      docker_only:
        description: 'Skip builds and only publish Docker image'
        required: true
        type: boolean
        default: false

jobs:
  build-publish-windows:
    if: github.event.inputs.windows == 'true' && github.event.inputs.docker_only == 'false'
    name: Build and publish windows
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start AWS ECS instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          SLACK_BOT_USER_OAUTH_ACCESS_TOKEN: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
        run: |
          exec julia +1.11.7 --project=./compile ./compile/ecs.jl --development_stage "${{ github.event.inputs.development_stage }}" --version_suffix "${{ github.event.inputs.version_suffix }}" --overwrite "${{ github.event.inputs.overwrite }}" --os windows

  build-publish-linux:
    if: github.event.inputs.linux == 'true' && github.event.inputs.docker_only == 'false'
    name: Build and publish linux
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start AWS ECS instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          SLACK_BOT_USER_OAUTH_ACCESS_TOKEN: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
        run: |
          exec julia +1.11.7 --project=./compile ./compile/ecs.jl --development_stage "${{ github.event.inputs.development_stage }}" --version_suffix "${{ github.event.inputs.version_suffix }}" --overwrite "${{ github.event.inputs.overwrite }}" --os linux

  post-publish:
    if: github.event.inputs.development_stage == 'Stable release'  
    name: Create release
    runs-on: self-hosted
    needs: [build-publish-windows, build-publish-linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: SebRollen/toml-action@v1.2.0
        id: project_toml
        with:
          file: 'Project.toml'
          field: 'version'

      - uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.project_toml.outputs.value }}
          generateReleaseNotes: true

  docker-publish:
    name: Build and publish container to ghcr.io
    runs-on: [self-hosted, linux]
    needs: [build-publish-windows, build-publish-linux]
    if: always() && (needs.build-publish-linux.result == 'success' || github.event.inputs.docker_only == 'true')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy platform image
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          exec julia +1.11.7 --project=./compile ./compile/deploy_to_ghcr.jl --development_stage "${{ github.event.inputs.development_stage }}" --version_suffix "${{ github.event.inputs.version_suffix }}" --overwrite "${{ github.event.inputs.overwrite }}"
